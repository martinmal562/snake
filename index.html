<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css"> 
</head>
<body class="body">
    <div class="snake">
        <h1>SNAKE</h1>
        <canvas id="field" width="400" height="400"></canvas>
        <br>
        <button onclick="snakeRestart()" class="restart" id="restart">start</button>

        <div class="controls"> 
            <button onclick="snakeKeypress('w')" class="button up">A</button>
            <button onclick="snakeKeypress('s')" class="button down">V</button>
            <button onclick="snakeKeypress('a')" class="button left">&lt</button>
            <button onclick="snakeKeypress('d')" class="button right">&gt</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
